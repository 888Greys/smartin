version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: smartinvest-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartinvest
      POSTGRES_PASSWORD: smartinvest123
      POSTGRES_DB: smartinvest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
